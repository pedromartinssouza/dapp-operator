apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "dapp-operator.fullname" . }}-manager
  labels:
    {{- include "dapp-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - cache.dapp-operator.com
  resources:
  - dapps
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - cache.dapp-operator.com
  resources:
  - dapps/finalizers
  verbs:
  - update
- apiGroups:
  - cache.dapp-operator.com
  resources:
  - dapps/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - helm.toolkit.fluxcd.io
  resources:
  - helmreleases
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - source.toolkit.fluxcd.io
  resources:
  - helmrepositories
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
